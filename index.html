<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DM Win AI Predictor</title>

<meta name="description" content="AI sequence predictor for DM Win Wingo 1 minute game using historical pattern analysis">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
max-width:550px;
margin:auto;
}

.box{
background:#0f172a;
padding:15px;
border-radius:8px;
margin-top:10px;
font-size:18px;
}

.big{color:#22c55e}
.small{color:#facc15}

</style>
</head>

<body>

<h2>DM Win AI Predictor</h2>

<div class="card">

<div class="box" id="last">Loading results...</div>

<div class="box" id="prediction">Waiting for data...</div>

</div>

<script>

let history=[]

function getSize(n){
return n>=5?"Big":"Small"
}

async function fetchResults(){

try{

/* Example API placeholder
You must replace with real result API */

let response=await fetch(
"https://api.mocki.io/v2/79fb05cb/wingo"
)

let data=await response.json()

let numbers=data.results

numbers.forEach(n=>history.push(n))

localStorage.setItem(
"dm_history",
JSON.stringify(history)
)

analyze()

}catch(e){

let saved=localStorage.getItem("dm_history")

if(saved){
history=JSON.parse(saved)
analyze()
}

}

}

function analyze(){

if(history.length<20)return

let last5=history.slice(-5)

document.getElementById("last")
.innerHTML="Last Results: "+last5.join(" , ")

let pattern=last5.join("")

let nextNumbers=[]

for(let i=0;i<history.length-5;i++){

let part=history.slice(i,i+5).join("")

if(part===pattern){

nextNumbers.push(history[i+5])

}

}

if(nextNumbers.length==0)return

let numCount={}
let sizeCount={}

nextNumbers.forEach(n=>{

numCount[n]=(numCount[n]||0)+1

let s=getSize(n)

sizeCount[s]=(sizeCount[s]||0)+1

})

let numbers=Object.keys(numCount)
.sort((a,b)=>numCount[b]-numCount[a])
.slice(0,2)

let sizePred=Object.keys(sizeCount)
.sort((a,b)=>sizeCount[b]-sizeCount[a])[0]

document.getElementById("prediction").innerHTML=

"Predicted Numbers: "+numbers.join(" , ")+"<br>"+
"Big / Small: <span class='"+sizePred.toLowerCase()+"'>"+sizePred+"</span>"

}

fetchResults()

setInterval(fetchResults,60000)

</script>

</body>
</html>
