<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Win Predictor</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* MAIN PAGE */
.container{
padding:15px;
text-align:center;
}

h1{
margin-bottom:10px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin:10px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.big{color:#22c55e;}
.small{color:#ef4444;}

/* FLOATING BUTTON */
.float-btn{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
color:black;
padding:12px 18px;
border-radius:50px;
font-weight:bold;
cursor:pointer;
z-index:999;
}

/* FLOATING TOOL */
.floating-box{
position:fixed;
top:100px;
left:20px;
width:280px;
background:#1e293b;
border-radius:15px;
padding:15px;
display:none;
z-index:1000;
box-shadow:0 0 20px black;
}

.close{
float:right;
cursor:pointer;
color:red;
font-size:18px;
}

/* HISTORY */
.history{
max-height:200px;
overflow:auto;
text-align:left;
font-size:13px;
}

.row{
display:flex;
justify-content:space-between;
margin:5px 0;
padding:5px;
background:#0f172a;
border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 Ultra Win Predictor</h1>

<div class="card">
<h3>⏱ Time Left</h3>
<h2 id="timer">--</h2>
</div>

<div class="card">
<h3>🔢 Current Period</h3>
<h2 id="period">--</h2>
</div>

<div class="card">
<h3>🤖 Prediction</h3>
<h2 id="prediction">--</h2>
<p id="confidence"></p>
</div>

<div class="card">
<h3>📊 Last Results</h3>
<div class="history" id="history"></div>
</div>

</div>

<!-- FLOAT BUTTON -->
<div class="float-btn" onclick="toggleFloat()">⚡</div>

<!-- FLOATING TOOL -->
<div class="floating-box" id="floatBox">
<span class="close" onclick="toggleFloat()">✖</span>
<h3>⚡ Quick Predictor</h3>

<p>Period: <span id="fPeriod"></span></p>
<p>Result: <span id="fResult"></span></p>
<p>Prediction: <span id="fPredict"></span></p>

</div>

<script>

// ===== GLOBAL =====
let historyData = [];
let currentPeriod = 100000;
let timer = 30;

// ===== TIMER START (8 AM LOGIC) =====
function startSystem(){
setInterval(()=>{
timer--;

if(timer <= 0){
timer = 30;
newRound();
}

document.getElementById("timer").innerText = timer + "s";
},1000);
}

// ===== NEW ROUND =====
function newRound(){

currentPeriod++;

let number = Math.floor(Math.random()*10);
let type = number >=5 ? "Big" : "Small";

let result = {
period: currentPeriod,
number:number,
type:type
};

historyData.unshift(result);
if(historyData.length > 20) historyData.pop();

updateUI();
predict();
}

// ===== PREDICTION =====
function predict(){

let last10 = historyData.slice(0,10);

let big=0, small=0;

last10.forEach(r=>{
if(r.type=="Big") big++;
else small++;
});

let prediction, confidence;

if(big > small){
prediction = "Small";
confidence = (big/10*100).toFixed(0);
}else{
prediction = "Big";
confidence = (small/10*100).toFixed(0);
}

// random number prediction
let num = Math.floor(Math.random()*10);

document.getElementById("prediction").innerText =
prediction + " ("+num+")";

document.getElementById("confidence").innerText =
"Confidence: "+confidence+"%";

// floating
document.getElementById("fPredict").innerText =
prediction+" "+num;

}

// ===== UI UPDATE =====
function updateUI(){

document.getElementById("period").innerText = currentPeriod;
document.getElementById("fPeriod").innerText = currentPeriod;

let historyDiv = document.getElementById("history");
historyDiv.innerHTML = "";

historyData.forEach(r=>{

let div = document.createElement("div");
div.className="row";

div.innerHTML = `
<span>${r.period}</span>
<span>${r.number}</span>
<span class="${r.type=='Big'?'big':'small'}">${r.type}</span>
`;

historyDiv.appendChild(div);
});

// floating last result
let last = historyData[0];
if(last){
document.getElementById("fResult").innerText =
last.number + " ("+last.type+")";
}

}

// ===== FLOAT TOGGLE =====
function toggleFloat(){
let box = document.getElementById("floatBox");
box.style.display = box.style.display=="block"?"none":"block";
}

// ===== DRAG FLOAT =====
let box = document.getElementById("floatBox");
let isDown=false, offsetX, offsetY;

box.addEventListener("touchstart",(e)=>{
isDown=true;
offsetX = e.touches[0].clientX - box.offsetLeft;
offsetY = e.touches[0].clientY - box.offsetTop;
});

document.addEventListener("touchmove",(e)=>{
if(!isDown) return;
box.style.left = (e.touches[0].clientX - offsetX)+"px";
box.style.top = (e.touches[0].clientY - offsetY)+"px";
});

document.addEventListener("touchend",()=>isDown=false);

// ===== INIT =====
startSystem();

</script>

</body>
</html>
