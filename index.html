<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sequence AI Predictor</title>

<style>

body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#38bdf8;
}

.box{
background:#1e293b;
padding:25px;
border-radius:10px;
max-width:450px;
margin:auto;
}

input{
width:50px;
height:50px;
font-size:22px;
text-align:center;
margin:5px;
border:none;
border-radius:6px;
}

button{
padding:12px 25px;
font-size:16px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#0ea5e9;
}

.result{
margin-top:20px;
font-size:18px;
}

.matches{
margin-top:10px;
color:#94a3b8;
font-size:14px;
}

</style>
</head>

<body>

<h1>AI Sequence Predictor</h1>

<div class="box">

<h3>Enter Last 5 Results</h3>

<input maxlength="1" id="n1" oninput="limit(this)">
<input maxlength="1" id="n2" oninput="limit(this)">
<input maxlength="1" id="n3" oninput="limit(this)">
<input maxlength="1" id="n4" oninput="limit(this)">
<input maxlength="1" id="n5" oninput="limit(this)">

<br>

<button onclick="analyze()">Analyze Sequence</button>

<div class="result" id="prediction"></div>
<div class="matches" id="matches"></div>

</div>

<script>

function limit(input){
input.value=input.value.replace(/[^0-9]/g,'');
}

function analyze(){

let seq=[
document.getElementById("n1").value,
document.getElementById("n2").value,
document.getElementById("n3").value,
document.getElementById("n4").value,
document.getElementById("n5").value
];

if(seq.includes("")){
alert("Enter all 5 numbers");
return;
}

let sequence=seq.join("");

/* Example historical results dataset */
let history="3819475620394817562039481756203948175620394817562039481756203948175620394817562039481756203948175620394817";

let foundNext=[];

/* search sequence */

for(let i=0;i<history.length-5;i++){

let part=history.substring(i,i+5);

if(part===sequence){

let next=history.charAt(i+5);

foundNext.push(next);

}

}

/* if no matches generate predictions */

if(foundNext.length===0){

for(let i=0;i<5;i++){
foundNext.push(Math.floor(Math.random()*10));
}

}

/* count frequency */

let freq={};

foundNext.forEach(n=>{
freq[n]=(freq[n]||0)+1;
});

/* sort by frequency */

let sorted=Object.keys(freq).sort((a,b)=>freq[b]-freq[a]);

let predictions=sorted.slice(0,3);

/* display */

document.getElementById("prediction").innerHTML=
"<b>Predicted Numbers:</b> "+predictions.join(" , ");

document.getElementById("matches").innerHTML=
"Numbers found after same sequence: "+foundNext.join(" , ");

}

</script>

</body>
</html>
