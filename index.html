<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PRO Floating Predictor</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin-top:120px;
}

/* start button */

.startBtn{
padding:14px 28px;
font-size:18px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
}

/* floating tool */

#tool{
position:fixed;
right:20px;
bottom:100px;
width:280px;
background:#1e293b;
border-radius:14px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
display:none;
z-index:9999;
}

/* header */

#header{
display:flex;
justify-content:space-between;
background:#020617;
padding:10px;
cursor:move;
border-radius:14px 14px 0 0;
}

#header span{
cursor:pointer;
font-size:14px;
}

/* body */

#body{
padding:15px;
}

.predict{
font-size:20px;
margin-top:8px;
}

.nextBtn{
margin-top:12px;
width:100%;
padding:10px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.confBar{
height:10px;
background:#334155;
border-radius:10px;
overflow:hidden;
margin-top:8px;
}

.confBar span{
display:block;
height:100%;
background:#22c55e;
}

/* history */

.history{
margin-top:10px;
font-size:13px;
max-height:120px;
overflow:auto;
}

/* bubble */

#bubble{
position:fixed;
right:20px;
bottom:100px;
width:55px;
height:55px;
background:#22c55e;
border-radius:50%;
display:none;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;
}

input{
width:100%;
padding:8px;
border-radius:6px;
border:none;
margin-top:5px;
text-align:center;
font-size:16px;
}

</style>

</head>

<body>

<h2>AI Floating Predictor</h2>

<button class="startBtn" onclick="startTool()">START TOOL</button>


<div id="tool">

<div id="header">

<span onclick="hideTool()">HIDE</span>

<div>AI TOOL</div>

<span onclick="closeTool()">❌</span>

</div>

<div id="body">

<div>Period Number</div>
<input id="period" placeholder="Enter Period">

<div class="predict" id="countdown">Next round: 60s</div>

<div class="predict" id="number">Number: --</div>
<div class="predict" id="size">Big/Small: --</div>

<div id="confText">Confidence: --</div>

<div class="confBar">
<span id="bar" style="width:0%"></span>
</div>

<button class="nextBtn" onclick="predict()">NEXT</button>

<div class="history" id="history"></div>

</div>

</div>

<div id="bubble" onclick="showTool()">⚡</div>

<script>

let history=[];
let time=60;

/* start */

function startTool(){

document.getElementById("tool").style.display="block";

startTimer();

predict();

}

/* timer */

function startTimer(){

setInterval(()=>{

time--;

if(time<=0){
time=60;
predict();
}

document.getElementById("countdown").innerText="Next round: "+time+"s";

},1000);

}

/* prediction */

function predict(){

let nums=[];

for(let i=0;i<20;i++){
nums.push(Math.floor(Math.random()*10));
}

let sum=nums.reduce((a,b)=>a+b,0);

let avg=sum/nums.length;

let size=avg>=5?"Big":"Small";

let number=Math.floor(Math.random()*10);

let confidence=Math.floor(Math.random()*40)+55;

document.getElementById("number").innerText="Number: "+number;
document.getElementById("size").innerText="Big/Small: "+size;

document.getElementById("confText").innerText="Confidence: "+confidence+"%";

document.getElementById("bar").style.width=confidence+"%";

history.unshift("Prediction → "+number+" / "+size);

if(history.length>10) history.pop();

document.getElementById("history").innerHTML=history.join("<br>");

}

/* hide */

function hideTool(){

document.getElementById("tool").style.display="none";
document.getElementById("bubble").style.display="flex";

}

/* show */

function showTool(){

document.getElementById("tool").style.display="block";
document.getElementById("bubble").style.display="none";

}

/* close */

function closeTool(){

document.getElementById("tool").style.display="none";
document.getElementById("bubble").style.display="none";

}

/* drag */

let tool=document.getElementById("tool");

let header=document.getElementById("header");

let pos1=0,pos2=0,pos3=0,pos4=0;

header.onmousedown=dragMouseDown;

function dragMouseDown(e){

e=e||window.event;

pos3=e.clientX;
pos4=e.clientY;

document.onmouseup=closeDrag;

document.onmousemove=elementDrag;

}

function elementDrag(e){

e=e||window.event;

pos1=pos3-e.clientX;
pos2=pos4-e.clientY;

pos3=e.clientX;
pos4=e.clientY;

tool.style.top=(tool.offsetTop-pos2)+"px";

tool.style.left=(tool.offsetLeft-pos1)+"px";

}

function closeDrag(){

document.onmouseup=null;
document.onmousemove=null;

}

</script>

</body>
</html>
