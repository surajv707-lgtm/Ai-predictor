<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WinGo 1 Min Predictor - Live AI Tool</title>

<meta name="description" content="WinGo 1 minute predictor tool with live period number, countdown timer, history and AI based prediction system. Fast and mobile friendly.">

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:#fff;
text-align:center;
}

.container{
padding:10px;
}

.card{
background:#0f172a;
margin:10px;
padding:15px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.6);
}

.big{color:#22c55e;}
.small{color:#ef4444;}

.history{
max-height:200px;
overflow:auto;
font-size:13px;
}

.row{
display:flex;
justify-content:space-between;
background:#020617;
margin:4px 0;
padding:5px;
border-radius:6px;
}

/* FLOAT */
.float-btn{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
color:#000;
padding:12px;
border-radius:50%;
font-weight:bold;
z-index:999;
}

.float-box{
position:fixed;
top:120px;
left:20px;
background:#0f172a;
padding:15px;
border-radius:12px;
display:none;
width:260px;
z-index:1000;
}
</style>

</head>

<body>

<div class="container">

<h2>🔥 WinGo 1 Min Predictor</h2>

<div class="card">
<h3>⏱ Timer</h3>
<h1 id="timer">60</h1>
</div>

<div class="card">
<h3>📊 Period</h3>
<h2 id="period">--</h2>
</div>

<div class="card">
<h3>🤖 Prediction</h3>
<h2 id="predict">--</h2>
<p id="confidence"></p>
</div>

<div class="card">
<h3>📜 History</h3>
<div class="history" id="history"></div>
</div>

</div>

<div class="float-btn" onclick="toggle()">⚡</div>

<div class="float-box" id="box">
<p>Period: <span id="fPeriod"></span></p>
<p>Result: <span id="fResult"></span></p>
<p>Next: <span id="fPredict"></span></p>
</div>

<script>

let timer=60;
let period=202603180001;
let history=[];

// TIMER
setInterval(()=>{
timer--;

if(timer<=0){
timer=60;
nextRound();
}

document.getElementById("timer").innerText=timer;
},1000);

// NEXT ROUND
function nextRound(){

period++;

let num=Math.floor(Math.random()*10);
let type=num>=5?"Big":"Small";

let obj={period,num,type};

history.unshift(obj);
if(history.length>20) history.pop();

update();
predict();

}

// UPDATE UI
function update(){

document.getElementById("period").innerText=period;
document.getElementById("fPeriod").innerText=period;

let h=document.getElementById("history");
h.innerHTML="";

history.forEach(r=>{
let d=document.createElement("div");
d.className="row";
d.innerHTML=`
<span>${r.period}</span>
<span>${r.num}</span>
<span class="${r.type=='Big'?'big':'small'}">${r.type}</span>
`;
h.appendChild(d);
});

if(history[0]){
document.getElementById("fResult").innerText=
history[0].num+" "+history[0].type;
}

}

// PREDICT LOGIC (ADVANCED)
function predict(){

let last=history.slice(0,10);

let big=0,small=0;

last.forEach(x=>{
if(x.type=="Big") big++;
else small++;
});

let result,conf;

// hybrid logic
if(big>small){
result="Small";
conf=big*10;
}else{
result="Big";
conf=small*10;
}

// random number bias
let num=Math.floor(Math.random()*10);

document.getElementById("predict").innerText=
result+" ("+num+")";

document.getElementById("confidence").innerText=
"Confidence: "+conf+"%";

document.getElementById("fPredict").innerText=
result+" "+num;

}

// FLOAT
function toggle(){
let b=document.getElementById("box");
b.style.display=b.style.display=="block"?"none":"block";
}

</script>

</body>
</html>
