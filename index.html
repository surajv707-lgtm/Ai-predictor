<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wingo AI Predictor</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

h1{
color:#38bdf8;
}

.box{
background:#1e293b;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

input{
width:70px;
padding:10px;
margin:5px;
font-size:18px;
text-align:center;
border-radius:5px;
border:none;
}

button{
padding:10px 20px;
font-size:16px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0ea5e9;
}

.result{
margin-top:20px;
font-size:18px;
}

table{
margin-top:30px;
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #334155;
}

th{
background:#1e293b;
}

.green{color:#22c55e}
.red{color:#ef4444}
.violet{color:#a855f7}

</style>
</head>

<body>

<h1>AI Wingo Predictor</h1>

<div class="box">

<h3>Enter Last 3 Results</h3>

<input type="number" id="r1" min="0" max="9">
<input type="number" id="r2" min="0" max="9">
<input type="number" id="r3" min="0" max="9">

<br>

<button onclick="predict()">Analyze & Predict</button>

<div class="result" id="analysis"></div>

</div>

<h2>Prediction History</h2>

<table id="history">
<tr>
<th>Inputs</th>
<th>Prediction</th>
</tr>
</table>

<script>

function getSize(num){
return num >=5 ? "Big" : "Small";
}

function getColor(num){

if(num==0) return "Red+Violet";
if(num==5) return "Green+Violet";

if([2,4,6,8].includes(num)) return "Red";
if([1,3,7,9].includes(num)) return "Green";

}

function randomNumber(){
return Math.floor(Math.random()*10);
}

function predict(){

let r1 = Number(document.getElementById("r1").value);
let r2 = Number(document.getElementById("r2").value);
let r3 = Number(document.getElementById("r3").value);

if(isNaN(r1)||isNaN(r2)||isNaN(r3)){
alert("Enter all 3 numbers");
return;
}

let s1=getSize(r1);
let s2=getSize(r2);
let s3=getSize(r3);

let c1=getColor(r1);
let c2=getColor(r2);
let c3=getColor(r3);

let predictSize;
let predictColor;

if(s1=="Small" && s2=="Small" && s3=="Small"){
predictSize="Big";
}
else if(s1=="Big" && s2=="Big" && s3=="Big"){
predictSize="Small";
}
else{
predictSize=Math.random()>0.5?"Big":"Small";
}

if(c1==c2 && c2==c3){

if(c1.includes("Red")) predictColor="Green";
else predictColor="Red";

}
else{

predictColor=Math.random()>0.5?"Red":"Green";

}

let number=randomNumber();

let resultHTML=`

<b>Analysis</b><br>
${r1} → ${s1} | ${c1}<br>
${r2} → ${s2} | ${c2}<br>
${r3} → ${s3} | ${c3}

<br><br>

<b>Prediction</b><br>

Number: ${number}<br>
Size: ${predictSize}<br>
Color: ${predictColor}

`;

document.getElementById("analysis").innerHTML=resultHTML;

let table=document.getElementById("history");

let row=table.insertRow(-1);

let cell1=row.insertCell(0);
let cell2=row.insertCell(1);

cell1.innerHTML=`${r1}, ${r2}, ${r3}`;

cell2.innerHTML=`
Number ${number}<br>
${predictSize} / ${predictColor}
`;

}

</script>

</body>
</html>
