<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sequence Predictor</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
max-width:450px;
margin:auto;
}

input{
width:55px;
height:55px;
font-size:22px;
text-align:center;
margin:5px;
border:none;
border-radius:6px;
background:#0f172a;
color:white;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.analyze{background:#38bdf8;color:white;}
.reset{background:#ef4444;color:white;}

.box{
margin-top:15px;
background:#0f172a;
padding:12px;
border-radius:6px;
font-size:18px;
}

.big{color:#22c55e}
.small{color:#facc15}

</style>
</head>

<body>

<h2>AI Sequence Predictor</h2>

<div class="card">

<div>Enter Last 5 Results</div>

<input maxlength="1" id="n1">
<input maxlength="1" id="n2">
<input maxlength="1" id="n3">
<input maxlength="1" id="n4">
<input maxlength="1" id="n5">

<br>

<button class="analyze" onclick="analyze()">Analyze</button>
<button class="reset" onclick="resetAll()">Reset</button>

<div id="result"></div>

</div>

<script>

/* prediction lock */

let predicted=false;

/* cursor move */

const inputs=document.querySelectorAll("input");

inputs.forEach((input,i)=>{

input.addEventListener("input",()=>{

input.value=input.value.replace(/[^0-9]/g,'');

if(input.value.length==1 && i<4){
inputs[i+1].focus();
}

});

input.addEventListener("keydown",(e)=>{

if(e.key==="Backspace" && input.value=="" && i>0){
inputs[i-1].focus();
}

});

});

/* reset */

function resetAll(){

inputs.forEach(i=>i.value="");

document.getElementById("result").innerHTML="";

predicted=false;

inputs[0].focus();

}

/* size rule */

function getSize(n){
return n>=5?"Big":"Small";
}

/* dataset */

let history="";

for(let i=0;i<4000;i++){
history+=Math.floor(Math.random()*10);
}

/* analyze */

function analyze(){

if(predicted){
alert("Prediction already done. Press Reset to analyze again.");
return;
}

let seq=[...inputs].map(i=>i.value);

if(seq.includes("")){
alert("Enter all 5 numbers");
return;
}

let pattern=seq.join("");

let nextNumbers=[];

/* search sequence */

for(let i=0;i<history.length-5;i++){

let part=history.substring(i,i+5);

if(part===pattern){

let next=Number(history.charAt(i+5));

nextNumbers.push(next);

}

}

/* fallback */

if(nextNumbers.length==0){

for(let i=0;i<30;i++){
nextNumbers.push(Math.floor(Math.random()*10));
}

}

/* frequency */

let numCount={},sizeCount={};

nextNumbers.forEach(n=>{

numCount[n]=(numCount[n]||0)+1;

let s=getSize(n);

sizeCount[s]=(sizeCount[s]||0)+1;

});

/* top 2 numbers */

let numbers=Object.keys(numCount)
.sort((a,b)=>numCount[b]-numCount[a])
.slice(0,2);

/* majority size */

let sizePred=Object.keys(sizeCount)
.sort((a,b)=>sizeCount[b]-sizeCount[a])[0];

/* display */

document.getElementById("result").innerHTML=

"<div class='box'><b>Numbers:</b> "+numbers.join(" , ")+"</div>"+

"<div class='box'><b>Big/Small:</b> <span class='"+sizePred.toLowerCase()+"'>"+sizePred+"</span></div>";

predicted=true;

}

</script>

</body>
</html>
