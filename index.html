<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sequence AI Predictor</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
max-width:520px;
margin:auto;
}

input{
width:55px;
height:55px;
font-size:22px;
text-align:center;
margin:5px;
border:none;
border-radius:6px;
background:#0f172a;
color:white;
}

textarea{
width:100%;
height:120px;
margin-top:10px;
background:#0f172a;
color:white;
border:none;
padding:10px;
border-radius:6px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.analyze{background:#38bdf8;color:white;}
.reset{background:#ef4444;color:white;}

.box{
margin-top:15px;
background:#0f172a;
padding:12px;
border-radius:6px;
font-size:18px;
}

.big{color:#22c55e}
.small{color:#facc15}
</style>
</head>

<body>

<h2>Sequence Predictor</h2>

<div class="card">

<div>Enter Last 5 Results</div>

<input maxlength="1" id="n1">
<input maxlength="1" id="n2">
<input maxlength="1" id="n3">
<input maxlength="1" id="n4">
<input maxlength="1" id="n5">

<div style="margin-top:15px;">
Paste history numbers from website (example: 3 7 2 8 5 1 4...)
</div>

<textarea id="history"></textarea>

<br>

<button class="analyze" onclick="analyze()">Analyze</button>
<button class="reset" onclick="resetAll()">Reset</button>

<div id="result"></div>

</div>

<script>

let predicted=false;

const inputs=document.querySelectorAll("input");

inputs.forEach((input,i)=>{

input.addEventListener("input",()=>{

input.value=input.value.replace(/[^0-9]/g,'');

if(input.value.length==1 && i<4){
inputs[i+1].focus();
}

});

input.addEventListener("keydown",(e)=>{

if(e.key==="Backspace" && input.value=="" && i>0){
inputs[i-1].focus();
}

});

});

function resetAll(){

inputs.forEach(i=>i.value="");
document.getElementById("result").innerHTML="";
predicted=false;

}

function getSize(n){
return n>=5?"Big":"Small";
}

function analyze(){

if(predicted){
alert("Press reset before next prediction");
return;
}

let seq=[...inputs].map(i=>i.value);

if(seq.includes("")){
alert("Enter all 5 numbers");
return;
}

let pattern=seq.join("");

let history=document
.getElementById("history")
.value
.replace(/[^0-9]/g,"");

if(history.length<10){
alert("Paste more history data");
return;
}

let nextNumbers=[];

for(let i=0;i<history.length-5;i++){

let part=history.substring(i,i+5);

if(part===pattern){

let next=Number(history.charAt(i+5));

nextNumbers.push(next);

}

}

if(nextNumbers.length==0){
alert("Sequence not found in history");
return;
}

let numCount={},sizeCount={};

nextNumbers.forEach(n=>{

numCount[n]=(numCount[n]||0)+1;

let s=getSize(n);

sizeCount[s]=(sizeCount[s]||0)+1;

});

let numbers=Object.keys(numCount)
.sort((a,b)=>numCount[b]-numCount[a])
.slice(0,2);

let sizePred=Object.keys(sizeCount)
.sort((a,b)=>sizeCount[b]-sizeCount[a])[0];

document.getElementById("result").innerHTML=

"<div class='box'><b>Predicted Numbers:</b> "+numbers.join(" , ")+"</div>"+
"<div class='box'><b>Big/Small:</b> <span class='"+sizePred.toLowerCase()+"'>"+sizePred+"</span></div>";

predicted=true;

}

</script>

</body>
</html>
