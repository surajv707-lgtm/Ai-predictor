<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI ULTRA Predictor</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

header{
background:#020617;
padding:18px;
font-size:22px;
font-weight:bold;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.panel{
background:#1e293b;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 0 12px rgba(0,0,0,0.4);
}

.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

input{
width:40px;
height:40px;
margin:4px;
font-size:18px;
text-align:center;
border:none;
border-radius:6px;
}

button{
background:#22c55e;
border:none;
padding:12px 25px;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#16a34a;
}

.result{
font-size:20px;
margin-top:12px;
}

.bar{
height:10px;
background:#334155;
border-radius:8px;
overflow:hidden;
margin-top:8px;
}

.bar span{
display:block;
height:100%;
background:#22c55e;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

td,th{
padding:8px;
border-bottom:1px solid #334155;
}

.win{color:#22c55e;}
.loss{color:#f43f5e;}

</style>
</head>

<body>

<header>AI ULTRA Predictor Panel</header>

<div class="container">

<div class="panel">

<h3>Enter Last 20 Results</h3>

<div id="inputs" class="grid"></div>

<button onclick="predict()">Run AI Analysis</button>

</div>

<div class="panel">

<h3>Prediction</h3>

<div id="numberResult" class="result">Number: --</div>
<div id="sizeResult" class="result">Big/Small: --</div>
<div id="trendResult" class="result">Trend: --</div>

<div id="confidenceText">Confidence: --</div>

<div class="bar">
<span id="confidenceBar" style="width:0%"></span>
</div>

</div>

<div class="panel">

<h3>Hot / Cold Numbers</h3>

<div id="hotCold"></div>

</div>

<div class="panel">

<h3>Prediction History</h3>

<table>

<thead>
<tr>
<th>#</th>
<th>Prediction</th>
<th>Result</th>
<th>Status</th>
</tr>
</thead>

<tbody id="historyTable"></tbody>

</table>

</div>

</div>

<script>

const inputBox=document.getElementById("inputs");

for(let i=0;i<20;i++){

let input=document.createElement("input");
input.type="number";
input.min=0;
input.max=9;

input.addEventListener("input",()=>{
if(input.value.length==1 && input.nextElementSibling)
input.nextElementSibling.focus();
});

inputBox.appendChild(input);

}

let predictionHistory=[];

function predict(){

let inputs=document.querySelectorAll("#inputs input");

let nums=[];

inputs.forEach(i=>{
if(i.value!=="") nums.push(parseInt(i.value));
});

if(nums.length<10){
alert("Enter at least 10 numbers");
return;
}

let freq=Array(10).fill(0);

nums.forEach(n=>{
freq[n]++;
});

let hot=freq.indexOf(Math.max(...freq));
let cold=freq.indexOf(Math.min(...freq));

let avg=nums.reduce((a,b)=>a+b)/nums.length;

let size=avg>=5?"Big":"Small";

let trend=nums[nums.length-1]>nums[nums.length-2]?"Increasing":"Decreasing";

let confidence=Math.min(95,55+(Math.max(...freq)*4));

document.getElementById("numberResult").innerText="Number: "+hot;
document.getElementById("sizeResult").innerText="Big/Small: "+size;
document.getElementById("trendResult").innerText="Trend: "+trend;

document.getElementById("confidenceText").innerText="Confidence: "+confidence+"%";
document.getElementById("confidenceBar").style.width=confidence+"%";

document.getElementById("hotCold").innerText="Hot Number: "+hot+" | Cold Number: "+cold;

predictionHistory.push({
predict:hot+" / "+size
});

updateHistory();

}

function updateHistory(){

let table=document.getElementById("historyTable");
table.innerHTML="";

predictionHistory.forEach((p,i)=>{

let row=document.createElement("tr");

row.innerHTML=
"<td>"+(i+1)+"</td>"+
"<td>"+p.predict+"</td>"+
"<td>--</td>"+
"<td>Pending</td>";

table.appendChild(row);

});

}

</script>

</body>
</html>
