<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WinGo Smart Predictor</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
margin-bottom:30px;
}

.container{
background:#1e293b;
padding:25px;
border-radius:12px;
max-width:400px;
margin:auto;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.inputs{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

.inputs input{
width:50px;
height:50px;
font-size:22px;
text-align:center;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

.history{
margin-top:20px;
text-align:left;
}

.history div{
background:#0f172a;
padding:10px;
border-radius:6px;
margin-bottom:5px;
}

.limit{
margin-top:15px;
color:#facc15;
}

</style>
</head>

<body>

<h1>WinGo Predictor</h1>

<div class="container">

<div class="inputs">
<input type="text" maxlength="1" id="d1">
<input type="text" maxlength="1" id="d2">
<input type="text" maxlength="1" id="d3">
<input type="text" maxlength="1" id="d4">
</div>

<button onclick="predict()" id="predictBtn">Predict</button>

<div class="limit" id="limitText">Predictions left: 5</div>

<div class="result" id="result"></div>

<div class="history" id="history"></div>

</div>

<script>

let limit = 5

const inputs = document.querySelectorAll(".inputs input")

inputs.forEach((input,index)=>{
input.addEventListener("input",function(){

this.value = this.value.replace(/[^0-9]/g,'')

if(this.value && index < inputs.length-1){
inputs[index+1].focus()
}

})
})

function predict(){

if(limit <= 0){
alert("Daily limit reached")
return
}

let nums = []

inputs.forEach(i=>{
if(i.value === "") return alert("Enter all digits")
nums.push(parseInt(i.value))
})

let sum = nums.reduce((a,b)=>a+b,0)

let result = (sum % 2 === 0) ? "BIG" : "SMALL"

document.getElementById("result").innerText = "Prediction: " + result

let history = document.getElementById("history")

let div = document.createElement("div")

div.innerText = nums.join("") + " → " + result

history.prepend(div)

limit--

document.getElementById("limitText").innerText = "Predictions left: " + limit

if(limit === 0){
document.getElementById("predictBtn").disabled = true
}

}

</script>

</body>
</html>
