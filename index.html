<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WinGo Smart Predictor</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
margin-bottom:25px;
}

.container{
background:#1e293b;
padding:25px;
border-radius:12px;
max-width:430px;
margin:auto;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.inputs{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

.inputs input{
width:55px;
height:55px;
font-size:24px;
text-align:center;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
outline:none;
}

.buttons{
display:flex;
gap:10px;
justify-content:center;
margin-bottom:15px;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.predict{
background:#22c55e;
color:white;
}

.clear{
background:#ef4444;
color:white;
}

.submit{
background:#3b82f6;
color:white;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

.result{
margin-top:15px;
font-size:22px;
font-weight:bold;
}

.limit{
margin-top:10px;
color:#facc15;
}

.timer{
margin-top:8px;
color:#f87171;
font-weight:bold;
}

.plbox{
margin-top:15px;
}

.plbox input{
padding:10px;
border-radius:6px;
border:none;
width:120px;
text-align:center;
}

.history{
margin-top:20px;
text-align:left;
}

.history div{
background:#0f172a;
padding:10px;
border-radius:6px;
margin-bottom:6px;
}

</style>
</head>

<body>

<h1>WinGo Predictor</h1>

<div class="container">

<div class="inputs">
<input type="tel" inputmode="numeric" maxlength="1">
<input type="tel" inputmode="numeric" maxlength="1">
<input type="tel" inputmode="numeric" maxlength="1">
<input type="tel" inputmode="numeric" maxlength="1">
</div>

<div class="buttons">
<button class="predict" onclick="predict()" id="predictBtn">Predict</button>
<button class="clear" onclick="clearInputs()">Clear</button>
</div>

<div class="limit" id="limitText">Predictions left: 5</div>
<div class="timer" id="timerText"></div>

<div class="result" id="result"></div>

<div class="plbox">
<input id="plInput" placeholder="Profit/Loss">
<button class="submit" onclick="submitResult()">Submit</button>
</div>

<div class="history" id="history"></div>

</div>

<script>

let limit = 5
let cooldown = 3*60*60*1000

let lastPrediction=""
let lastNumber=""
let lastDigitPrediction=""

const inputs=document.querySelectorAll(".inputs input")

inputs.forEach((input,index)=>{

input.addEventListener("input",function(){

this.value=this.value.replace(/[^0-9]/g,'')

if(this.value && index<inputs.length-1){
inputs[index+1].focus()
}

})

input.addEventListener("keydown",function(e){

if(e.key==="Backspace" && !this.value && index>0){
inputs[index-1].focus()
}

})

})

function predict(){

if(limit<=0){
alert("Limit reached")
return
}

let nums=[]

for(let i of inputs){

if(i.value===""){
alert("Enter all digits")
return
}

nums.push(parseInt(i.value))

}

let sum=nums.reduce((a,b)=>a+b,0)

let bigsmall=(sum%2===0)?"BIG":"SMALL"

let predictedNumber=sum%10

lastPrediction=bigsmall
lastDigitPrediction=predictedNumber
lastNumber=nums.join("")

document.getElementById("result").innerText=
"Prediction: "+bigsmall+" | Number: "+predictedNumber

limit--

document.getElementById("limitText").innerText=
"Predictions left: "+limit

if(limit===0){

document.getElementById("predictBtn").disabled=true

document.getElementById("limitText").innerText=
"Predictions left: 0"

let end=new Date().getTime()+cooldown

localStorage.setItem("cooldownEnd",end)

startTimer()

}

}

function submitResult(){

let pl=document.getElementById("plInput").value.trim()

if(pl===""){
alert("Enter Profit or Loss")
return
}

let history=document.getElementById("history")

let div=document.createElement("div")

div.innerText=
lastNumber+" → "+lastPrediction+" | "+lastDigitPrediction+" → "+pl

history.prepend(div)

document.getElementById("plInput").value=""

}

function clearInputs(){

inputs.forEach(i=>i.value="")
inputs[0].focus()

}

function startTimer(){

let timerText=document.getElementById("timerText")

let interval=setInterval(()=>{

let end=localStorage.getItem("cooldownEnd")

let now=new Date().getTime()

let distance=end-now

if(distance<=0){

clearInterval(interval)

limit=5

document.getElementById("predictBtn").disabled=false

document.getElementById("limitText").innerText=
"Predictions left: 5"

timerText.innerText=""

localStorage.removeItem("cooldownEnd")

return

}

let h=Math.floor(distance/(1000*60*60))
let m=Math.floor((distance%(1000*60*60))/(1000*60))
let s=Math.floor((distance%(1000*60))/1000)

timerText.innerText=
"Next predictions in: "+h+"h "+m+"m "+s+"s"

},1000)

}

window.onload=function(){

let end=localStorage.getItem("cooldownEnd")

if(end){

document.getElementById("predictBtn").disabled=true

document.getElementById("limitText").innerText=
"Predictions left: 0"

startTimer()

}

}

</script>

</body>
</html>
