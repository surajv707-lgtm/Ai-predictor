<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WinGo AI Floating Predictor</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

/* Floating button */

#floatingBtn{
position:fixed;
bottom:25px;
right:25px;
background:#22c55e;
color:white;
border:none;
padding:16px 18px;
border-radius:50%;
font-size:18px;
cursor:pointer;
z-index:9999;
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

/* Predictor panel */

#predictor{
position:fixed;
top:120px;
right:20px;
width:260px;
background:#1e293b;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
display:none;
z-index:9999;
overflow:hidden;
}

/* Header (drag area) */

.header{
background:#22c55e;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
cursor:move;
}

/* Close button */

.close{
cursor:pointer;
font-size:18px;
}

/* Content */

.content{
padding:15px;
}

.prediction{
font-size:22px;
color:#22c55e;
margin-top:10px;
font-weight:bold;
}

.history{
margin-top:12px;
font-size:14px;
color:#cbd5f5;
}

</style>
</head>

<body>

<h1>WinGo AI Predictor</h1>

<button id="floatingBtn">AI</button>

<div id="predictor">

<div class="header" id="dragHeader">
<span>AI Predictor</span>
<span class="close" onclick="closePredictor()">❌</span>
</div>

<div class="content">

<div>Prediction</div>
<div class="prediction" id="result">BIG - 7</div>

<div class="history">
Last Results:<br>
6 8 3 1 9
</div>

</div>
</div>

<script>

/* open panel */

document.getElementById("floatingBtn").onclick=function(){
document.getElementById("predictor").style.display="block";
}

/* close panel */

function closePredictor(){
document.getElementById("predictor").style.display="none";
}

/* draggable */

const panel=document.getElementById("predictor");
const header=document.getElementById("dragHeader");

let isDragging=false;
let offsetX,offsetY;

header.addEventListener("mousedown",startDrag);
header.addEventListener("touchstart",startDrag);

function startDrag(e){

isDragging=true;

let clientX=e.touches?e.touches[0].clientX:e.clientX;
let clientY=e.touches?e.touches[0].clientY:e.clientY;

offsetX=clientX-panel.offsetLeft;
offsetY=clientY-panel.offsetTop;

document.addEventListener("mousemove",drag);
document.addEventListener("touchmove",drag);

document.addEventListener("mouseup",stopDrag);
document.addEventListener("touchend",stopDrag);

}

function drag(e){

if(!isDragging)return;

let clientX=e.touches?e.touches[0].clientX:e.clientX;
let clientY=e.touches?e.touches[0].clientY:e.clientY;

panel.style.left=(clientX-offsetX)+"px";
panel.style.top=(clientY-offsetY)+"px";

}

function stopDrag(){

isDragging=false;

document.removeEventListener("mousemove",drag);
document.removeEventListener("touchmove",drag);

}

</script>

</body>
</html>
