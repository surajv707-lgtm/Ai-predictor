<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Floating Predictor</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
height:200vh;
}

#floatBtn{
position:fixed;
bottom:30px;
right:20px;
background:#22c55e;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
cursor:pointer;
box-shadow:0 0 15px rgba(0,0,0,.5);
z-index:9999;
}

#panel{
position:fixed;
bottom:110px;
right:20px;
width:300px;
background:#1e293b;
border-radius:15px;
padding:15px;
display:none;
box-shadow:0 0 20px rgba(0,0,0,.6);
z-index:9999;
}

#panel h3{
margin:5px 0 10px 0;
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
text-align:center;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:10px;
padding:10px;
background:#0f172a;
border-radius:8px;
text-align:center;
}

.history{
margin-top:10px;
max-height:120px;
overflow:auto;
font-size:14px;
}

.close{
position:absolute;
top:5px;
right:10px;
cursor:pointer;
font-size:18px;
}

.timer{
text-align:center;
margin-top:5px;
color:#38bdf8;
font-size:14px;
}

</style>
</head>

<body>

<div id="floatBtn">AI</div>

<div id="panel">

<div class="close" onclick="closePanel()">❌</div>

<h3>AI Predictor</h3>

<div class="timer" id="timer">Next round in 30s</div>

<input type="number" id="period" placeholder="Enter Period Number">

<input type="number" id="lastnum" placeholder="Last Result Number">

<button onclick="predict()">Predict</button>

<div class="result" id="prediction">Waiting...</div>

<div class="history" id="history"></div>

</div>

<script>

let panel=document.getElementById("panel")
let floatBtn=document.getElementById("floatBtn")

floatBtn.onclick=function(){
panel.style.display="block"
}

function closePanel(){
panel.style.display="none"
}

function predict(){

let last=parseInt(document.getElementById("lastnum").value)

if(isNaN(last)){
alert("Enter last result number")
return
}

let next=Math.floor(Math.random()*10)

let size = next >=5 ? "BIG" : "SMALL"

let text="Number: "+next+" | "+size

document.getElementById("prediction").innerHTML=text

let history=document.getElementById("history")

history.innerHTML=
"<div>"+text+"</div>"+history.innerHTML

}

let time=30

setInterval(()=>{

time--

if(time<=0){
time=30
}

document.getElementById("timer").innerHTML=
"Next round in "+time+"s"

},1000)


/* draggable floating button */

let isDown=false
let offset=[0,0]

floatBtn.addEventListener('touchstart',function(e){

isDown=true
offset=[
floatBtn.offsetLeft-e.touches[0].clientX,
floatBtn.offsetTop-e.touches[0].clientY
]

})

document.addEventListener('touchmove',function(e){

if(isDown){

floatBtn.style.left=
(e.touches[0].clientX+offset[0])+'px'

floatBtn.style.top=
(e.touches[0].clientY+offset[1])+'px'

}

})

document.addEventListener('touchend',function(){
isDown=false
})

</script>

</body>
</html>
