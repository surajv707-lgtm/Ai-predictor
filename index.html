<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Pattern AI Predictor</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#38bdf8;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:12px;
max-width:520px;
margin:auto;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

input{
width:55px;
height:55px;
font-size:22px;
text-align:center;
margin:5px;
border:none;
border-radius:6px;
background:#0f172a;
color:white;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
margin:10px;
}

.analyze{background:#38bdf8;color:white;}
.reset{background:#ef4444;color:white;}

.resultBox{
margin-top:15px;
padding:12px;
border-radius:6px;
background:#0f172a;
font-size:18px;
}

.big{color:#22c55e}
.small{color:#facc15}

.red{color:#ef4444}
.green{color:#22c55e}
.violet{color:#a855f7}

.status{
margin-top:15px;
color:#94a3b8;
}

.loader{
margin-top:15px;
font-size:14px;
color:#94a3b8;
}
</style>
</head>

<body>

<h1>Ultra Pattern AI Predictor</h1>

<div class="card">

<div>Enter Last 5 Results</div>

<input maxlength="1" id="n1">
<input maxlength="1" id="n2">
<input maxlength="1" id="n3">
<input maxlength="1" id="n4">
<input maxlength="1" id="n5">

<br>

<button class="analyze" onclick="startAnalysis()">Analyze</button>
<button class="reset" onclick="resetAll()">Reset</button>

<div class="status" id="status"></div>
<div id="result"></div>

</div>

<script>

/* cursor auto move */

const inputs=document.querySelectorAll("input");

inputs.forEach((input,i)=>{

input.addEventListener("input",()=>{

input.value=input.value.replace(/[^0-9]/g,'');

if(input.value.length==1 && i<4){
inputs[i+1].focus();
}

});

input.addEventListener("keydown",(e)=>{

if(e.key==="Backspace" && input.value=="" && i>0){
inputs[i-1].focus();
}

});

});

/* reset */

function resetAll(){
inputs.forEach(i=>i.value="");
document.getElementById("status").innerHTML="";
document.getElementById("result").innerHTML="";
inputs[0].focus();
}

/* color rules */

function getColor(n){
if(n==0) return "Red+Violet";
if(n==5) return "Green+Violet";
if([2,4,6,8].includes(n)) return "Red";
if([1,3,7,9].includes(n)) return "Green";
}

/* size rule */

function getSize(n){
return n>=5?"Big":"Small";
}

/* large simulated dataset */

let historyData="";
for(let i=0;i<1500;i++){
historyData+=Math.floor(Math.random()*10);
}

/* start analysis */

function startAnalysis(){

let seq=[...inputs].map(i=>i.value);

if(seq.includes("")){
alert("Enter all 5 numbers");
return;
}

document.getElementById("status").innerHTML="Analyzing patterns... please wait (20s)";

setTimeout(()=>runAnalysis(seq.join("")),20000);

}

/* analysis engine */

function runAnalysis(sequence){

let nextNumbers=[];

for(let i=0;i<historyData.length-5;i++){

let part=historyData.substring(i,i+5);

if(part===sequence){

nextNumbers.push(Number(historyData.charAt(i+5)));

}

}

/* fallback */

if(nextNumbers.length==0){

for(let i=0;i<30;i++){
nextNumbers.push(Math.floor(Math.random()*10));
}

}

/* frequency */

let numCount={},sizeCount={},colorCount={};

nextNumbers.forEach(n=>{

numCount[n]=(numCount[n]||0)+1;

let s=getSize(n);
sizeCount[s]=(sizeCount[s]||0)+1;

let c=getColor(n);
colorCount[c]=(colorCount[c]||0)+1;

});

/* predictions */

let numbers=Object.keys(numCount).sort((a,b)=>numCount[b]-numCount[a]).slice(0,3);

let sizePred=Object.keys(sizeCount).sort((a,b)=>sizeCount[b]-sizeCount[a])[0];

let colorPred=Object.keys(colorCount).sort((a,b)=>colorCount[b]-colorCount[a])[0];

let total=nextNumbers.length;

let numProb=Math.round((numCount[numbers[0]]/total)*100);
let sizeProb=Math.round((sizeCount[sizePred]/total)*100);
let colorProb=Math.round((colorCount[colorPred]/total)*100);

/* display */

document.getElementById("status").innerHTML="Analysis complete";

document.getElementById("result").innerHTML=

"<div class='resultBox'><b>Top Numbers:</b> "+numbers.join(" , ")+" ("+numProb+"%)</div>"+

"<div class='resultBox'><b>Big/Small:</b> <span class='"+sizePred.toLowerCase()+"'>"+sizePred+"</span> ("+sizeProb+"%)</div>"+

"<div class='resultBox'><b>Color:</b> "+colorPred+" ("+colorProb+"%)</div>";

}

</script>

</body>
</html>
