<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sequence AI Predictor</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
max-width:500px;
margin:auto;
}

input{
width:55px;
height:55px;
font-size:22px;
text-align:center;
margin:5px;
border:none;
border-radius:6px;
background:#0f172a;
color:white;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.analyze{background:#38bdf8;color:white;}
.reset{background:#ef4444;color:white;}

.result{
margin-top:20px;
font-size:18px;
}

.box{
margin-top:10px;
background:#0f172a;
padding:10px;
border-radius:6px;
}

.big{color:#22c55e}
.small{color:#facc15}

.red{color:#ef4444}
.green{color:#22c55e}
.violet{color:#a855f7}

</style>
</head>

<body>

<h1>Sequence AI Predictor</h1>

<div class="card">

<div>Enter Last 5 Results</div>

<input maxlength="1" id="n1">
<input maxlength="1" id="n2">
<input maxlength="1" id="n3">
<input maxlength="1" id="n4">
<input maxlength="1" id="n5">

<br>

<button class="analyze" onclick="analyze()">Analyze</button>
<button class="reset" onclick="resetAll()">Reset</button>

<div id="result" class="result"></div>

</div>

<script>

/* cursor move */

const inputs=document.querySelectorAll("input");

inputs.forEach((input,i)=>{

input.addEventListener("input",()=>{

input.value=input.value.replace(/[^0-9]/g,'');

if(input.value.length==1 && i<4){
inputs[i+1].focus();
}

});

input.addEventListener("keydown",(e)=>{

if(e.key==="Backspace" && input.value=="" && i>0){
inputs[i-1].focus();
}

});

});

/* reset */

function resetAll(){

inputs.forEach(i=>i.value="");
document.getElementById("result").innerHTML="";
inputs[0].focus();

}

/* rules */

function getSize(n){
return n>=5?"Big":"Small";
}

function getColor(n){

if(n==0) return "Red+Violet";
if(n==5) return "Green+Violet";

if([2,4,6,8].includes(n)) return "Red";
if([1,3,7,9].includes(n)) return "Green";

}

/* big dataset */

let history="";

for(let i=0;i<3000;i++){
history+=Math.floor(Math.random()*10);
}

/* main analysis */

function analyze(){

let seq=[...inputs].map(i=>i.value);

if(seq.includes("")){
alert("Enter all numbers");
return;
}

let pattern=seq.join("");

let nextNumbers=[];

/* find sequence */

for(let i=0;i<history.length-5;i++){

let part=history.substring(i,i+5);

if(part===pattern){

let next=Number(history.charAt(i+5));

nextNumbers.push(next);

}

}

/* if sequence not found */

if(nextNumbers.length==0){

for(let i=0;i<30;i++){
nextNumbers.push(Math.floor(Math.random()*10));
}

}

/* frequency */

let numCount={},sizeCount={},colorCount={};

nextNumbers.forEach(n=>{

numCount[n]=(numCount[n]||0)+1;

let s=getSize(n);
sizeCount[s]=(sizeCount[s]||0)+1;

let c=getColor(n);
colorCount[c]=(colorCount[c]||0)+1;

});

/* predictions */

let numbers=Object.keys(numCount)
.sort((a,b)=>numCount[b]-numCount[a])
.slice(0,3);

let sizePred=Object.keys(sizeCount)
.sort((a,b)=>sizeCount[b]-sizeCount[a])[0];

let colorPred=Object.keys(colorCount)
.sort((a,b)=>colorCount[b]-colorCount[a])[0];

/* display */

document.getElementById("result").innerHTML=

"<div class='box'><b>Numbers:</b> "+numbers.join(" , ")+"</div>"+

"<div class='box'><b>Big/Small:</b> <span class='"+sizePred.toLowerCase()+"'>"+sizePred+"</span></div>"+

"<div class='box'><b>Color:</b> "+colorPred+"</div>";

}

</script>

</body>
</html>
