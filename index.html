<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sequence Predictor</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
max-width:520px;
margin:auto;
}

input{
width:55px;
height:55px;
font-size:22px;
text-align:center;
margin:5px;
border:none;
border-radius:6px;
background:#0f172a;
color:white;
}

textarea{
width:100%;
height:120px;
margin-top:10px;
background:#0f172a;
color:white;
border:none;
padding:10px;
border-radius:6px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:6px;
cursor:pointer;
background:#38bdf8;
color:white;
}

.box{
margin-top:15px;
background:#0f172a;
padding:12px;
border-radius:6px;
font-size:18px;
}

</style>
</head>

<body>

<h2>Sequence Predictor</h2>

<div class="card">

<div>Enter Last 5 Results</div>

<input maxlength="1" id="n1">
<input maxlength="1" id="n2">
<input maxlength="1" id="n3">
<input maxlength="1" id="n4">
<input maxlength="1" id="n5">

<div style="margin-top:15px;">
Paste history numbers from website
</div>

<textarea id="history"></textarea>

<br>

<button onclick="predict()">Predict</button>

<div id="result"></div>

</div>

<script>

function predict(){

let seq=[
n1.value,
n2.value,
n3.value,
n4.value,
n5.value
]

if(seq.includes("")){
alert("Enter all 5 numbers")
return
}

let pattern=seq.join("")

let history=document
.getElementById("history")
.value
.replace(/[^0-9]/g,"")

let nextNumbers=[]

for(let i=0;i<history.length-5;i++){

let part=history.substring(i,i+5)

if(part===pattern){

let next=history.charAt(i+5)

nextNumbers.push(next)

}

}

if(nextNumbers.length==0){

result.innerHTML=
"<div class='box'>Sequence not found</div>"

return
}

let count={}

nextNumbers.forEach(n=>{
count[n]=(count[n]||0)+1
})

let prediction=Object.keys(count)
.sort((a,b)=>count[b]-count[a])[0]

result.innerHTML=

"<div class='box'><b>Predicted Next Result:</b> "+prediction+"</div>"

}

</script>

</body>
</html>
