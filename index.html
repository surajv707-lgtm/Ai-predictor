<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>WinGo 1 Min Smart Analyzer</title>

<meta name="description" content="WinGo 1 minute smart analyzer with period tracking, IST timer and probability prediction.">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

header{
padding:15px;
background:#020617;
font-size:20px;
font-weight:bold;
}

.container{
max-width:400px;
margin:auto;
padding:20px;
}

.timer{
font-size:26px;
margin:15px 0;
color:#22c55e;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
font-size:16px;
text-align:center;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:bold;
}

.result{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-top:15px;
}

.history{
margin-top:15px;
max-height:200px;
overflow:auto;
background:#1e293b;
padding:10px;
border-radius:10px;
}

.float{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
}

.panel{
position:fixed;
bottom:100px;
right:20px;
width:280px;
background:#1e293b;
border-radius:10px;
padding:15px;
display:none;
}

.close{
position:absolute;
right:10px;
top:5px;
cursor:pointer;
}

</style>
</head>

<body>

<header>WinGo Smart Analyzer</header>

<div class="container">

<div class="timer" id="timer"></div>

<input id="period" placeholder="Enter Period Number">

<input id="resultInput" placeholder="Enter Last Result Number">

<button onclick="addResult()">Add Result</button>

<div class="result" id="prediction">
Prediction waiting...
</div>

<div class="history" id="history"></div>

</div>

<div class="float" onclick="openPanel()">AI</div>

<div class="panel" id="panel">

<div class="close" onclick="closePanel()">❌</div>

<h3>Quick Prediction</h3>

<button onclick="predict()">Run Analysis</button>

</div>

<script>

let history=[]

function addResult(){

let val=parseInt(document.getElementById("resultInput").value)

if(isNaN(val)) return

history.unshift(val)

if(history.length>20) history.pop()

updateHistory()

predict()

}

function updateHistory(){

let h=""

history.forEach(r=>{

let size=r>=5?"Big":"Small"

h+=`<div>${r} - ${size}</div>`

})

document.getElementById("history").innerHTML=h

}

function predict(){

if(history.length<3){
document.getElementById("prediction").innerHTML="Need more data"
return
}

let big=0
let small=0

history.forEach(n=>{
if(n>=5) big++
else small++
})

let prediction=big>small?"Small":"Big"

let num

if(prediction==="Small"){
num=Math.floor(Math.random()*5)   // 0-4
}else{
num=Math.floor(Math.random()*5)+5 // 5-9
}

document.getElementById("prediction").innerHTML=
"Suggested: "+prediction+" | Number "+num

}

function openPanel(){
document.getElementById("panel").style.display="block"
}

function closePanel(){
document.getElementById("panel").style.display="none"
}

/* IST timer */

function updateTimer(){

let now=new Date()

let sec=now.getSeconds()

let remain=60-sec

document.getElementById("timer").innerHTML=
"Next Round in "+remain+"s (IST)"

}

setInterval(updateTimer,1000)

</script>

</body>
</html>
