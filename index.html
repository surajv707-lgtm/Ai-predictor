<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra AI Wingo Predictor</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#38bdf8;
margin-bottom:5px;
}

.subtitle{
color:#94a3b8;
margin-bottom:25px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:12px;
max-width:520px;
margin:auto;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.inputs{
margin:15px 0;
}

input{
width:55px;
height:55px;
font-size:22px;
text-align:center;
margin:5px;
border:none;
border-radius:6px;
background:#0f172a;
color:white;
}

button{
padding:12px 22px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
margin:8px;
}

.analyze{
background:#38bdf8;
color:white;
}

.reset{
background:#ef4444;
color:white;
}

.results{
margin-top:25px;
font-size:18px;
}

.box{
margin-top:15px;
padding:12px;
border-radius:6px;
background:#0f172a;
}

.red{color:#ef4444}
.green{color:#22c55e}
.violet{color:#a855f7}

.big{color:#22c55e}
.small{color:#facc15}

.history{
margin-top:20px;
font-size:13px;
color:#94a3b8;
max-height:100px;
overflow:auto;
}

</style>
</head>

<body>

<h1>Ultra AI Predictor</h1>
<div class="subtitle">Sequence Pattern Analyzer</div>

<div class="card">

<div>Enter Last 5 Results</div>

<div class="inputs">

<input maxlength="1" id="n1">
<input maxlength="1" id="n2">
<input maxlength="1" id="n3">
<input maxlength="1" id="n4">
<input maxlength="1" id="n5">

</div>

<button class="analyze" onclick="analyze()">Analyze</button>
<button class="reset" onclick="resetAll()">Reset</button>

<div class="results" id="output"></div>

<div class="history" id="history"></div>

</div>

<script>

/* auto move cursor */

const inputs=document.querySelectorAll("input");

inputs.forEach((input,i)=>{

input.addEventListener("input",e=>{

input.value=input.value.replace(/[^0-9]/g,'');

if(input.value.length===1 && i<4){
inputs[i+1].focus();
}

});

input.addEventListener("keydown",e=>{

if(e.key==="Backspace" && input.value==="" && i>0){
inputs[i-1].focus();
}

});

});

/* color rule */

function getColor(n){

if(n==0) return "Red+Violet";
if(n==5) return "Green+Violet";

if([2,4,6,8].includes(n)) return "Red";
if([1,3,7,9].includes(n)) return "Green";

}

/* size rule */

function getSize(n){
return n>=5 ? "Big":"Small";
}

/* reset */

function resetAll(){

inputs.forEach(i=>i.value="");
document.getElementById("output").innerHTML="";
document.getElementById("history").innerHTML="";
inputs[0].focus();

}

/* simulated large history dataset */

let historyData="3819475620394817562039481756203948175620394817562039481756203948175620394817562039481756203948175620394817562039481756203948175620394817";

/* main analysis */

function analyze(){

let seq=[...inputs].map(i=>i.value);

if(seq.includes("")){
alert("Enter all 5 numbers");
return;
}

let sequence=seq.join("");

let nextNumbers=[];

/* search pattern */

for(let i=0;i<historyData.length-5;i++){

let part=historyData.substring(i,i+5);

if(part===sequence){

let next=Number(historyData.charAt(i+5));
nextNumbers.push(next);

}

}

/* if none found simulate */

if(nextNumbers.length===0){

for(let i=0;i<20;i++){
nextNumbers.push(Math.floor(Math.random()*10));
}

}

/* frequency counters */

let numCount={},sizeCount={},colorCount={};

nextNumbers.forEach(n=>{

numCount[n]=(numCount[n]||0)+1;

let size=getSize(n);
sizeCount[size]=(sizeCount[size]||0)+1;

let color=getColor(n);
colorCount[color]=(colorCount[color]||0)+1;

});

/* sort predictions */

let numbers=Object.keys(numCount).sort((a,b)=>numCount[b]-numCount[a]).slice(0,3);

let sizePred=Object.keys(sizeCount).sort((a,b)=>sizeCount[b]-sizeCount[a])[0];
let colorPred=Object.keys(colorCount).sort((a,b)=>colorCount[b]-colorCount[a])[0];

/* probability */

let total=nextNumbers.length;

let probNum=Math.round((numCount[numbers[0]]/total)*100);
let probSize=Math.round((sizeCount[sizePred]/total)*100);
let probColor=Math.round((colorCount[colorPred]/total)*100);

/* display */

document.getElementById("output").innerHTML=

"<div class='box'><b>Top Numbers:</b> "+numbers.join(" , ")+" ("+probNum+"%)</div>"+

"<div class='box'><b>Big/Small:</b> <span class='"+sizePred.toLowerCase()+"'>"+sizePred+"</span> ("+probSize+"%)</div>"+

"<div class='box'><b>Color:</b> "+colorPred+" ("+probColor+"%)</div>";

document.getElementById("history").innerHTML=

"Matches analyzed: "+nextNumbers.join(" , ");

}

</script>

</body>
</html>
