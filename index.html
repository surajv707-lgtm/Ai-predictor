<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTRA PRO Floating Predictor</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin-top:120px;
}

/* start button */

.startBtn{
padding:14px 28px;
font-size:18px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
}

/* floating tool */

#tool{

position:fixed;
right:20px;
bottom:100px;
width:280px;
background:rgba(30,41,59,0.95);
border-radius:14px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
display:none;
z-index:9999;

}

/* header */

#header{

display:flex;
justify-content:space-between;
background:#020617;
padding:10px;
cursor:move;
border-top-left-radius:14px;
border-top-right-radius:14px;

}

#header span{
cursor:pointer;
font-size:14px;
}

/* body */

#body{
padding:15px;
}

.predict{
font-size:22px;
margin-top:8px;
}

.confidenceBar{

height:10px;
background:#334155;
border-radius:10px;
overflow:hidden;
margin-top:10px;

}

.confidenceBar span{

display:block;
height:100%;
background:#22c55e;

}

.nextBtn{

margin-top:12px;
width:100%;
padding:10px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white;
cursor:pointer;

}

.history{

margin-top:10px;
font-size:13px;
max-height:120px;
overflow:auto;

}

/* bubble */

#bubble{

position:fixed;
right:20px;
bottom:100px;
width:55px;
height:55px;
background:#22c55e;
border-radius:50%;
display:none;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;

}

</style>

</head>

<body>

<h2>ULTRA AI Predictor</h2>

<button class="startBtn" onclick="startTool()">START AI</button>


<div id="tool">

<div id="header">

<span onclick="hideTool()">HIDE</span>

<div>AI TOOL</div>

<span onclick="closeTool()">❌</span>

</div>

<div id="body">

<div id="num" class="predict">Number: --</div>
<div id="size" class="predict">Big/Small: --</div>
<div id="confidenceText">Confidence: --</div>

<div class="confidenceBar">
<span id="bar" style="width:0%"></span>
</div>

<button class="nextBtn" onclick="predict()">NEXT</button>

<div class="history" id="history"></div>

</div>

</div>

<div id="bubble" onclick="showTool()">⚡</div>


<script>

let history=[];

function startTool(){

document.getElementById("tool").style.display="block";
predict();

}

function closeTool(){

document.getElementById("tool").style.display="none";
document.getElementById("bubble").style.display="none";

}

function hideTool(){

document.getElementById("tool").style.display="none";
document.getElementById("bubble").style.display="flex";

}

function showTool(){

document.getElementById("tool").style.display="block";
document.getElementById("bubble").style.display="none";

}

function predict(){

let nums=[];

for(let i=0;i<20;i++){
nums.push(Math.floor(Math.random()*10));
}

let sum=nums.reduce((a,b)=>a+b,0);

let avg=sum/nums.length;

let size=avg>=5?"Big":"Small";

let number=Math.floor(Math.random()*10);

let confidence=Math.floor(Math.random()*40)+55;

document.getElementById("num").innerText="Number: "+number;

document.getElementById("size").innerText="Big/Small: "+size;

document.getElementById("confidenceText").innerText="Confidence: "+confidence+"%";

document.getElementById("bar").style.width=confidence+"%";

history.unshift("Prediction → "+number+" / "+size);

if(history.length>10) history.pop();

document.getElementById("history").innerHTML=history.join("<br>");

}

/* draggable */

dragElement(document.getElementById("tool"));

function dragElement(elmnt){

let pos1=0,pos2=0,pos3=0,pos4=0;

document.getElementById("header").onmousedown=dragMouseDown;

function dragMouseDown(e){

e=e||window.event;
pos3=e.clientX;
pos4=e.clientY;
document.onmouseup=closeDrag;
document.onmousemove=elementDrag;

}

function elementDrag(e){

e=e||window.event;
pos1=pos3-e.clientX;
pos2=pos4-e.clientY;
pos3=e.clientX;
pos4=e.clientY;

elmnt.style.top=(elmnt.offsetTop-pos2)+"px";
elmnt.style.left=(elmnt.offsetLeft-pos1)+"px";

}

function closeDrag(){

document.onmouseup=null;
document.onmousemove=null;

}

}

</script>

</body>
</html>
