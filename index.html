<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate AI Predictor</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
max-width:500px;
margin:auto;
}

input{
width:55px;
height:55px;
font-size:22px;
text-align:center;
margin:5px;
border:none;
border-radius:6px;
background:#0f172a;
color:white;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
margin:10px;
}

.analyze{background:#38bdf8}
.reset{background:#ef4444;color:white}

.box{
margin-top:15px;
padding:12px;
border-radius:6px;
background:#0f172a;
font-size:18px;
}

.big{color:#22c55e}
.small{color:#facc15}

.red{color:#ef4444}
.green{color:#22c55e}
.violet{color:#a855f7}

.status{
margin-top:10px;
color:#94a3b8;
}

</style>

</head>

<body>

<h1>Ultimate AI Predictor</h1>

<div class="card">

<div>Enter Last 5 Results</div>

<input maxlength="1" id="n1">
<input maxlength="1" id="n2">
<input maxlength="1" id="n3">
<input maxlength="1" id="n4">
<input maxlength="1" id="n5">

<br>

<button class="analyze" onclick="analyze()">Analyze</button>
<button class="reset" onclick="resetAll()">Reset</button>

<div class="status" id="status"></div>

<div id="result"></div>

</div>

<script>

const inputs=document.querySelectorAll("input");

inputs.forEach((input,i)=>{

input.addEventListener("input",()=>{

input.value=input.value.replace(/[^0-9]/g,'');

if(input.value.length==1 && i<4){
inputs[i+1].focus();
}

});

input.addEventListener("keydown",(e)=>{

if(e.key==="Backspace" && input.value=="" && i>0){
inputs[i-1].focus();
}

});

});

function getSize(n){
return n>=5?"Big":"Small";
}

function getColor(n){

if(n==0) return "Red+Violet";
if(n==5) return "Green+Violet";

if([2,4,6,8].includes(n)) return "Red";
if([1,3,7,9].includes(n)) return "Green";

}

function resetAll(){

inputs.forEach(i=>i.value="");

document.getElementById("result").innerHTML="";
document.getElementById("status").innerHTML="";

inputs[0].focus();

}

async function analyze(){

let seq=[...inputs].map(i=>i.value);

if(seq.includes("")){
alert("Enter all 5 numbers");
return;
}

document.getElementById("status").innerHTML="Analyzing website data...";

try{

/* example API placeholder */

let response=await fetch("https://api.allorigins.win/raw?url=https://dmwinn.win");

let text=await response.text();

/* extract numbers from page */

let numbers=text.match(/[0-9]/g).map(Number);

/* pattern search */

let sequence=seq.join("");

let next=[];

for(let i=0;i<numbers.length-5;i++){

let part=numbers.slice(i,i+5).join("");

if(part===sequence){

next.push(numbers[i+5]);

}

}

/* fallback if no match */

if(next.length==0){

for(let i=0;i<20;i++){
next.push(Math.floor(Math.random()*10));
}

}

let numCount={},sizeCount={},colorCount={};

next.forEach(n=>{

numCount[n]=(numCount[n]||0)+1;

let s=getSize(n);
sizeCount[s]=(sizeCount[s]||0)+1;

let c=getColor(n);
colorCount[c]=(colorCount[c]||0)+1;

});

let numbersPred=Object.keys(numCount).sort((a,b)=>numCount[b]-numCount[a]).slice(0,3);

let sizePred=Object.keys(sizeCount).sort((a,b)=>sizeCount[b]-sizeCount[a])[0];

let colorPred=Object.keys(colorCount).sort((a,b)=>colorCount[b]-colorCount[a])[0];

document.getElementById("status").innerHTML="Analysis complete";

document.getElementById("result").innerHTML=

"<div class='box'><b>Numbers:</b> "+numbersPred.join(" , ")+"</div>"+

"<div class='box'><b>Big/Small:</b> <span class='"+sizePred.toLowerCase()+"'>"+sizePred+"</span></div>"+

"<div class='box'><b>Color:</b> "+colorPred+"</div>";

}

catch(e){

document.getElementById("status").innerHTML="Website analysis failed";

}

}

</script>

</body>
</html>
